<svg viewBox="0 0 64 72" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SelfThreatMap">
  <defs>
    <linearGradient id="stm-sh" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#43d3ad"/>
      <stop offset=".55" stop-color="#33a78c"/>
      <stop offset="1" stop-color="#1f7763"/>
    </linearGradient>
    <clipPath id="stm-clip">
      <path d="M32 2 L60 13 V36 C60 54 47 66 32 70 C17 66 4 54 4 36 V13 Z"/>
    </clipPath>
  </defs>
  <!-- Self shield -->
  <path d="M32 2 L60 13 V36 C60 54 47 66 32 70 C17 66 4 54 4 36 V13 Z"
        fill="url(#stm-sh)" stroke="#bcd9e9" stroke-opacity=".4" stroke-width="1.5"/>
  <path d="M32 2 L32 70 C17 66 4 54 4 36 V13 Z" fill="#0d1117" fill-opacity=".12"/>
  <!-- globe grid (threat map) -->
  <g clip-path="url(#stm-clip)" fill="none" stroke="#0d1117" stroke-opacity=".30" stroke-width="1.3">
    <circle cx="32" cy="36" r="19"/>
    <ellipse cx="32" cy="36" rx="19" ry="7.5"/>
    <ellipse cx="32" cy="36" rx="7.5" ry="19"/>
    <line x1="13" y1="36" x2="51" y2="36"/>
  </g>
  <!-- attack arc + origin + ping target -->
  <path d="M17 50 Q31 19 45 30" fill="none" stroke="#eef4f7" stroke-width="1.7"
        stroke-linecap="round" stroke-dasharray="2 4" opacity=".9"/>
  <circle cx="17" cy="50" r="2.4" fill="#ff5a4d"/>
  <circle cx="45" cy="30" r="6" fill="none" stroke="#ff5a4d" stroke-width="1.4" opacity=".75"/>
  <circle cx="45" cy="30" r="3" fill="#fffefb"/>
</svg>
