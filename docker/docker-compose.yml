services:
  selfthreatmap:
    image: ghcr.io/s3lfcod3r/selfthreatmap:latest
    container_name: selfthreatmap
    restart: unless-stopped

    ports:
      - "8080:8080"   # Dashboard → http://EURE-IP:8080

    volumes:
      # ⚠️  PFLICHT: Pfad zu euren CrowdSec-Daten anpassen
      # Tipp: docker inspect crowdsec | grep -A5 "Mounts" → zeigt euren Datenpfad
      - /EUER-PFAD/data:/crowdsec/data:ro

      # Für dynamische Whitelist: Schreibzugriff auf postoverflows
      # Nur nötig wenn WHITELIST_ENABLED=true (Standard)
      - /EUER-PFAD/postoverflows:/crowdsec/postoverflows

      # Für IP-Unban: Docker-Socket einbinden
      # ⚠️  SICHERHEITSHINWEIS: Der Docker-Socket gibt faktisch Root-Rechte auf
      #     dem Host. Das ":ro" verhindert das NICHT (Socket ≠ Datei). Nur
      #     einbinden, wenn Unban/Whitelist-Restart wirklich gebraucht werden.
      #     Härter: tecnativa/docker-socket-proxy mit nur den nötigen Rechten
      #     vorschalten (EXEC für cscli), statt den vollen Socket zu mounten.
      #     Wer Unban nicht braucht: diese Zeile entfernen.
      - /var/run/docker.sock:/var/run/docker.sock:ro

      # OPTIONAL: Live-Firewall-Drops — Verzeichnis mit drops.jsonl einbinden
      # Nur nötig wenn DROPS_ENABLED=true (siehe unten)
      # - /EUER-PFAD/drops:/crowdsec/drops:ro

    environment:
      # ──────────────────────────────────────────────
      # ⚠️  PFLICHT: Server-Koordinaten eintragen
      # Tipp: Rechtsklick auf Google Maps → "Was ist hier?"
      # ──────────────────────────────────────────────
      - SERVER_LAT=0.0
      - SERVER_LON=0.0

      # ──────────────────────────────────────────────
      # ℹ️  OPTIONAL: Weitere Einstellungen
      # ──────────────────────────────────────────────
      - SERVER_NAME=MeinServer          # Anzeigename im Dashboard
      - CROWDSEC_CONTAINER=crowdsec     # Name des CrowdSec-Containers
      - CACHE_TTL=60                    # Cache-Zeit in Sekunden
      - DAYS_BACK=365                   # Wie viele Tage zurück anzeigen

      # Dynamische Whitelist (verhindert Selbst-Ban bei IP-Wechsel)
      - WHITELIST_ENABLED=true
      # Standard-Pfad: /crowdsec/postoverflows/s01-whitelist/my-whitelist.yaml
      # Nur ändern wenn ihr einen anderen Pfad nutzt:
      # - WHITELIST_FILE=/crowdsec/postoverflows/s01-whitelist/my-whitelist.yaml
      - WHITELIST_INTERVAL=900          # Prüfintervall in Sekunden (Standard: 15 min)
      # Wartezeit nach CrowdSec-Neustart — erhöhen wenn Timeout-Fehler im Log erscheinen
      - CROWDSEC_RESTART_WAIT=15
      - CROWDSEC_RESTART_COOLDOWN=300     # Mindestabstand zwischen CrowdSec-Neustarts (Sekunden)

      # ──────────────────────────────────────────────
      # 🔐 LOGIN + 2FA (Zwei-Faktor) — schützt das ganze Dashboard
      # ──────────────────────────────────────────────
      # Standardmäßig AKTIV. Beim ersten Start werden Passwort + 2FA-Secret
      # generiert und EINMALIG ins Container-Log geschrieben:
      #   docker logs selfthreatmap   → dort Passwort + TOTP-Secret ablesen
      # Danach hier fest setzen, damit sie Neustarts überleben:
      - AUTH_ENABLED=true
      - ADMIN_USERNAME=admin
      # Passwort im Klartext (wird intern gehasht) ODER ADMIN_PASSWORD_HASH nutzen:
      # - ADMIN_PASSWORD=dein-sicheres-passwort
      # 2FA-Secret (Base32) — aus dem Log übernehmen und hier eintragen:
      # - TOTP_SECRET=XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
      # Session-Signierschlüssel (sonst gehen Logins bei Neustart verloren):
      #   openssl rand -hex 32
      # - SESSION_SECRET=dein-zufaelliger-hex-key
      # Wenn die Map nur über HTTPS (Reverse-Proxy) erreichbar ist:
      # - COOKIE_SECURE=true
      # Zugang komplett ohne Login (NUR vertrauenswürdiges LAN!):
      # - AUTH_ENABLED=false

      # OPTIONAL: Live-Firewall-Drops (/drops-API). Standard: aus.
      # Braucht eine gemountete JSONL-Datei (eine Zeile = ein verworfenes Paket).
      # - DROPS_ENABLED=true
      # - DROPS_LOG_PATH=/crowdsec/drops/drops.jsonl
      # - DROPS_MAX_EVENTS=200
      # - DROPS_MAX_AGE_SECONDS=3600

    # Docker-Gruppe für Socket-Zugriff (Unban + Whitelist-Restart)
    # GID anpassen falls nötig: getent group docker | cut -d: -f3
    group_add:
      - "999"
