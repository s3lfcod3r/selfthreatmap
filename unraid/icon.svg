<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Hintergrund -->
  <rect width="128" height="128" rx="18" fill="#080c11"/>

  <!-- Äußerer Glow-Ring -->
  <path d="M64 10 L108 28 L108 70 C108 96 88 114 64 122 C40 114 20 96 20 70 L20 28 Z"
        fill="none" stroke="#33a78c" stroke-width="1" opacity="0.2"/>

  <!-- Shield Glow (weich) -->
  <path d="M64 14 L104 31 L104 70 C104 93 86 110 64 118 C42 110 24 93 24 70 L24 31 Z"
        fill="#33a78c" opacity="0.07"/>

  <!-- Shield Hauptform -->
  <path d="M64 14 L104 31 L104 70 C104 93 86 110 64 118 C42 110 24 93 24 70 L24 31 Z"
        fill="none" stroke="#33a78c" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Innere Shield-Linie -->
  <path d="M64 22 L97 36 L97 70 C97 89 82 104 64 111 C46 104 31 89 31 70 L31 36 Z"
        fill="none" stroke="#33a78c" stroke-width="1" opacity="0.35"/>

  <!-- Vertikale Mittellinie oben -->
  <line x1="64" y1="22" x2="64" y2="50" stroke="#33a78c" stroke-width="2" opacity="0.8"/>

  <!-- Horizontale Querlinie -->
  <line x1="44" y1="64" x2="84" y2="64" stroke="#33a78c" stroke-width="1.5" opacity="0.5"/>

  <!-- Zentraler Kern-Dot (leuchtet) -->
  <circle cx="64" cy="64" r="10" fill="#33a78c" opacity="0.15"/>
  <circle cx="64" cy="64" r="6"  fill="#33a78c" opacity="0.6"/>
  <circle cx="64" cy="64" r="3"  fill="#33a78c"/>

  <!-- Radar-Ringe um Kern -->
  <circle cx="64" cy="64" r="16" fill="none" stroke="#33a78c" stroke-width="1" opacity="0.25"/>
  <circle cx="64" cy="64" r="24" fill="none" stroke="#33a78c" stroke-width="0.75" opacity="0.15"/>

  <!-- Eck-Marker (4 Ecken des Shields) -->
  <rect x="22" y="29" width="5" height="5" fill="#33a78c" opacity="0.7"/>
  <rect x="101" y="29" width="5" height="5" fill="#33a78c" opacity="0.7"/>
</svg>
