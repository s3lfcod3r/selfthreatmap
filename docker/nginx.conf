worker_processes 1;
error_log /dev/stderr warn;
pid /run/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    /dev/stdout;
    sendfile      on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 5;

    server {
        listen 8080;
        server_name _;
        root /var/www/html;
        index index.html;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Dashboard
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Exporter-API Endpunkte — Proxy zu Python (Port 9456)
        location /metrics {
            proxy_pass http://127.0.0.1:9456/metrics;
            proxy_set_header Host $host;
            add_header Access-Control-Allow-Origin *;
        }

        location /unban {
            proxy_pass http://127.0.0.1:9456/unban;
            proxy_set_header Host $host;
        }

        location /whitelist-status {
            proxy_pass http://127.0.0.1:9456/whitelist-status;
            proxy_set_header Host $host;
            add_header Access-Control-Allow-Origin *;
        }

        location /config {
            proxy_pass http://127.0.0.1:9456/config;
            proxy_set_header Host $host;
            add_header Access-Control-Allow-Origin *;
        }
    }
}
