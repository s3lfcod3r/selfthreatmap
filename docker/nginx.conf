worker_processes 1;
error_log /dev/stderr warn;
pid /run/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    /dev/stdout;
    sendfile      on;
    keepalive_timeout 65;

    gzip on;
    gzip_proxied any;   # auch proxied Antworten (/metrics, /drops, /config) komprimieren
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 5;

    # Rate-Limit-Zonen (Brute-Force / Missbrauch begrenzen)
    limit_req_zone $binary_remote_addr zone=login:1m rate=20r/m;
    limit_req_zone $binary_remote_addr zone=unban:1m rate=10r/m;

    server {
        listen 8080;
        server_name _;
        root /var/www/html;
        index index.html;

        # ── Security-Header (auf allen Antworten) ──
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'" always;

        # ── Auth-Endpunkte (immer offen, KEIN auth_request) ──
        # Login/Setup mit Rate-Limit (exact match gewinnt vor /auth/-Prefix)
        location = /auth/login {
            limit_req zone=login burst=10 nodelay;
            proxy_pass http://127.0.0.1:9456/auth/login;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location = /auth/setup {
            limit_req zone=login burst=10 nodelay;
            proxy_pass http://127.0.0.1:9456/auth/setup;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        # Interner Auth-Check fuer auth_request — von aussen nicht erreichbar
        location = /auth/verify {
            internal;
            proxy_pass http://127.0.0.1:9456/auth/verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Host $host;
            proxy_set_header X-Original-URI $request_uri;
        }
        # Uebrige Auth-Aktionen (status, logout, password, 2fa/*) — Python
        # autorisiert die kontogebundenen Aktionen selbst per Session.
        location /auth/ {
            proxy_pass http://127.0.0.1:9456;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Cookie $http_cookie;
        }

        # Bei fehlender/abgelaufener Session zur Login-Seite leiten (Browser-Navigation)
        location @login_redirect {
            return 302 /auth/login;
        }

        # ── Einstellungen (geschuetzt) ──
        location = /settings {
            auth_request /auth/verify;
            error_page 401 = @login_redirect;
            proxy_pass http://127.0.0.1:9456/settings;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
        }

        # ── Dashboard (geschuetzt) ──
        location / {
            auth_request /auth/verify;
            # Nur Seitenaufrufe leiten zur Login-Seite; API-Endpunkte (unten)
            # geben stattdessen sauber 401 an fetch() zurueck.
            error_page 401 = @login_redirect;
            try_files $uri $uri/ /index.html;
        }

        # ── Exporter-API Endpunkte — geschuetzt, Proxy zu Python (Port 9456) ──
        location = /metrics {
            auth_request /auth/verify;
            proxy_pass http://127.0.0.1:9456/metrics;
            proxy_set_header Host $host;
        }
        location = /unban {
            auth_request /auth/verify;
            limit_req zone=unban burst=5 nodelay;
            proxy_pass http://127.0.0.1:9456/unban;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
        }
        location = /whitelist-status {
            auth_request /auth/verify;
            proxy_pass http://127.0.0.1:9456/whitelist-status;
            proxy_set_header Host $host;
        }
        location = /config {
            auth_request /auth/verify;
            proxy_pass http://127.0.0.1:9456/config;
            proxy_set_header Host $host;
        }
        # Live Firewall Drops API (optional, DROPS_ENABLED=true)
        location = /drops {
            auth_request /auth/verify;
            proxy_pass http://127.0.0.1:9456/drops;
            proxy_set_header Host $host;
        }
    }
}
